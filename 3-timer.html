<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <script type="module" crossorigin src="/my-homework-vite-project-01/3-timer.js"></script>
    <link rel="modulepreload" crossorigin href="/my-homework-vite-project-01/assets/modulepreload-polyfill-B5Qt9EMX.js">

    <link rel="stylesheet" crossorigin href="/my-homework-vite-project-01/assets/vendor-BKXH_bSq.css">
    <link rel="stylesheet" crossorigin href="/my-homework-vite-project-01/assets/3-timer-DOG0d2lY.css">
  </head>
  <body>
    <div class="container">
      <a class="back-link" href="./index.html">Go back</a>
      <h1 class="main-title">Timer</h1>
      <ul class="gallery"></ul>
    </div>
    <input type="text" id="datetime-picker" /><button type="button" data-start>
      Start
    </button>

    <div class="timer">
      <div class="field">
        <span class="value" data-days>00</span>
        <span class="label">День</span>
      </div>
      <div class="field">
        <span class="value" data-hours>00</span>
        <span class="label">Година</span>
      </div>
      <div class="field">
        <span class="value" data-minutes>00</span>
        <span class="label">Хвилина</span>
      </div>
      <div class="field">
        <span class="value" data-seconds>00</span>
        <span class="label">Секунда</span>
      </div>
    </div>
  </body>
</html>
